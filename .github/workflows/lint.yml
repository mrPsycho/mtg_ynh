name: YunoHost Package Linter

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Run YunoHost Package Linter

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          path: mtg_ynh

      - name: Checkout package_linter
        uses: actions/checkout@v4
        with:
          repository: YunoHost/package_linter
          path: package_linter

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter dependencies
        run: |
          cd package_linter
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Run linter
        run: |
          cd package_linter
          source venv/bin/activate
          ./package_linter.py ../mtg_ynh
