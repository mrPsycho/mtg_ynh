#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2
id = "mtg"
name = "mtg"
description.en = "Highly-opinionated MTPROTO proxy for Telegram"

version = "2.2.8~ynh1"

maintainers = ["mrpsycho"]

[upstream]
license = "MIT"
code = "https://github.com/9seconds/mtg"
admindoc = "https://github.com/9seconds/mtg/blob/master/README.md"


[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = "not_relevant"
sso = "not_relevant"

ram.build = "50M"
ram.runtime = "50M"
disk = "50M"

[install]
    [install.port]
    type = "string"
    ask.en = "Choose a port for the proxy to bind to"
    default = "3128"

    [install.secret]
    type = "string"
    ask.en = "Enter the MTProto Secret (Starts with 'ee...' or provide a fronting domain like google.com to auto-generate)"
    default = "google.com"

    [install.dns]
    type = "string"
    ask.en = "Enter the DNS resolver IP"
    default = "1.1.1.1"

    [install.prometheus]
    type = "boolean"
    ask.en = "Enable Prometheus metrics?"
    default = false

[resources]
    [resources.system_user]

    [resources.install_dir]

    [resources.sources.main]
    # x86_64 / amd64
    amd64.url = "https://github.com/9seconds/mtg/releases/download/v2.2.8/mtg-2.2.8-linux-amd64.tar.gz"
    amd64.sha256 = "7ef19d079d85f4e00d4f8334ec1f3f3c8718e3d0ed1f3109ea9a8673138a2102"
    # i386
    i386.url = "https://github.com/9seconds/mtg/releases/download/v2.2.8/mtg-2.2.8-linux-386.tar.gz"
    i386.sha256 = "99c2f177730271b88d8f2404b2cf27d5ee997685f6d9118d4c8cac9c5aaedf50"
    # arm64 / aarch64
    arm64.url = "https://github.com/9seconds/mtg/releases/download/v2.2.8/mtg-2.2.8-linux-arm64.tar.gz"
    arm64.sha256 = "562a94dd4cafcb8f179b76cfeafb76da12747c8e230bc76235bf8746cc189644"
    # armhf / armv7
    armhf.url = "https://github.com/9seconds/mtg/releases/download/v2.2.8/mtg-2.2.8-linux-armv7.tar.gz"
    armhf.sha256 = "494ee3794ed00201e5333b478236ce2f434b33f2d3445f227debe9fc386bbef0"
